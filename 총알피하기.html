const AC = new (window.AudioContext || window.webkitAudioContext)();
const masterGain = AC.createGain();
masterGain.gain.value = 0.7;
masterGain.connect(AC.destination);

// Reverb
let reverbNode = null;
(function buildReverb() {
  const len = AC.sampleRate * 1.5;
  const buf = AC.createBuffer(2, len, AC.sampleRate);
  for (let c = 0; c < 2; c++) {
    const d = buf.getChannelData(c);
    for (let i = 0; i < len; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/len, 2);
  }
  reverbNode = AC.createConvolver();
  reverbNode.buffer = buf;
  const rv = AC.createGain(); rv.gain.value = 0.25;
  reverbNode.connect(rv); rv.connect(masterGain);
})();

function playTone(freq, type, dur, vol=0.3, startFreq=null, reverb=false) {
  const o = AC.createOscillator();
  const g = AC.createGain();
  o.connect(g);
  g.connect(masterGain);
  if (reverb && reverbNode) g.connect(reverbNode);
  o.type = type;
  if (startFreq) { o.frequency.setValueAtTime(startFreq, AC.currentTime); o.frequency.exponentialRampToValueAtTime(freq, AC.currentTime + dur*0.4); }
  else o.frequency.setValueAtTime(freq, AC.currentTime);
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
  o.start(); o.stop(AC.currentTime + dur + 0.05);
}
function playNoise(dur, vol=0.15, filterFreq=2000) {
  const buf = AC.createBuffer(1, AC.sampleRate * dur, AC.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random()*2-1;
  const src = AC.createBufferSource();
  const flt = AC.createBiquadFilter(); flt.type = 'lowpass'; flt.frequency.value = filterFreq;
  const g = AC.createGain();
  src.buffer = buf; src.connect(flt); flt.connect(g); g.connect(masterGain);
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
  src.start();
}

let bgmNodes = [];
function startBGM() {
  stopBGM();
  const chords = [[130.8,164.8,196],[138.6,174.6,207.7],[116.5,146.8,174.6],[123.5,155.6,185]];
  let ci = 0;
  // Bass drone
  const bass = AC.createOscillator(); const bg = AC.createGain();
  bass.type = 'sine'; bass.frequency.value = 65.4;
  bg.gain.value = 0.08; bass.connect(bg); bg.connect(masterGain);
  bass.start(); bgmNodes.push(bass, bg);
  // Pad chords
  function playChord() {
    const chord = chords[ci++ % chords.length];
    chord.forEach(f => {
      const o = AC.createOscillator(); const g = AC.createGain();
      o.type = 'sine'; o.frequency.value = f;
      g.gain.setValueAtTime(0, AC.currentTime);
      g.gain.linearRampToValueAtTime(0.04, AC.currentTime+1.5);
      g.gain.linearRampToValueAtTime(0.04, AC.currentTime+3);
      g.gain.linearRampToValueAtTime(0, AC.currentTime+4.5);
      o.connect(g); g.connect(reverbNode || masterGain);
      o.start(); o.stop(AC.currentTime+5);
      bgmNodes.push(o, g);
    });
  }
  playChord();
  const iv = setInterval(playChord, 4000);
  bgmNodes.push({ stop: ()=>clearInterval(iv) });
}
function stopBGM() {
  bgmNodes.forEach(n => { try { if(n.stop) n.stop(); } catch(e){} });
  bgmNodes = [];
}

function drawShip(x, y) {

  if (hitFlash > 0) ctx.globalAlpha = 0.4 + 0.6 * Math.abs(Math.sin(hitFlash * 0.8));

  // Shield effect when invincible
  if (invincible > 0) {
    const shieldPulse = 0.5 + 0.5 * Math.sin(Date.now() * 0.01);
    ctx.save();
    ctx.globalAlpha = 0.35 + 0.25 * shieldPulse;
    const shieldGrd = ctx.createRadialGradient(0, 0, 10, 0, 0, 28 + shieldPulse * 6);
    shieldGrd.addColorStop(0, 'rgba(0,220,255,0.0)');
    shieldGrd.addColorStop(0.7, 'rgba(0,200,255,0.5)');
    shieldGrd.addColorStop(1, 'rgba(0,255,255,0.9)');
    ctx.fillStyle = shieldGrd;
    ctx.beginPath(); ctx.arc(0, 0, 28 + shieldPulse * 6, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = `rgba(0,255,255,${0.6 + 0.4*shieldPulse})`;
    ctx.lineWidth = 2;
    ctx.shadowColor = '#00ffff'; ctx.shadowBlur = 15;
    ctx.stroke();

  // Glow

  ctx.shadowColor = '#00ccff'; ctx.shadowBlur = 18;

  ctx.beginPath(); ctx.moveTo(0,-22); ctx.lineTo(14,11); ctx.lineTo(0,6); ctx.lineTo(-14,11); ctx.closePath();
  ctx.fill();
  ctx.restore();

  // Cockpit glow

}

function drawThruster() {
  thrusterParts = thrusterParts.filter(p => p.life > 0);
  thrusterParts.forEach(p => {
    const a = p.life / p.maxLife;
    ctx.save();
    ctx.globalAlpha = a * 0.9;
    ctx.fillStyle = `hsl(${p.hue},100%,${40+a*40}%)`;
    ctx.shadowColor = `hsl(${p.hue},100%,60%)`;
    ctx.shadowBlur = 4;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * a, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life--;
  });
}

function drawBullet(b) {
  // Sine-wave bullets have a slightly different color
  const isSine = b.pattern === 'sine';
  const isSpiral = b.pattern === 'spiral';
  let baseColor = b.penalty ? '#ff2222' : (isSine ? '#ff88ff' : (isSpiral ? '#88ffff' : '#ffe040'));
  let glowColor = b.penalty ? '#ff0000' : (isSine ? '#ff00ff' : (isSpiral ? '#00ffff' : '#ffcc00'));

  // Trail
  if (b.trail && b.trail.length > 1) {
    for (let i = 1; i < b.trail.length; i++) {
      const a = i / b.trail.length * 0.5;
      ctx.strokeStyle = b.penalty ? `rgba(255,50,50,${a})` : `rgba(255,220,0,${a})`;
      ctx.lineWidth = b.penalty ? 3 : 2;
      ctx.beginPath();
      ctx.moveTo(b.trail[i-1].x, b.trail[i-1].y);
      ctx.lineTo(b.trail[i].x, b.trail[i].y);
      ctx.stroke();
    }
  }
  // Bullet glow ring
  ctx.save();
  ctx.globalAlpha = 0.25;
  ctx.fillStyle = glowColor;
  ctx.beginPath();
  ctx.arc(b.x, b.y, b.penalty ? 9 : 7, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // Bullet core
  ctx.save();
  ctx.fillStyle = baseColor;
  ctx.shadowColor = glowColor;
  ctx.shadowBlur = b.penalty ? 14 : 10;
  ctx.beginPath();
  ctx.arc(b.x, b.y, b.penalty ? 5.5 : 4, 0, Math.PI*2);
  ctx.fill();
  // Inner bright dot
  ctx.fillStyle = '#ffffff';
  ctx.shadowBlur = 0;
  ctx.beginPath();
  ctx.arc(b.x, b.y, b.penalty ? 2.2 : 1.5, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

    ctx.scale(pulse * lostScale, pulse * lostScale);
    ctx.fillStyle = alive ? '#ff4466' : (isLost ? '#ff8800' : '#333');
    ctx.shadowColor = alive ? '#ff0044' : (isLost ? '#ff8800' : 'transparent');
    ctx.shadowBlur = alive ? 8 : (isLost ? 12 : 0);
    ctx.globalAlpha = isLost ? (0.5 + 0.5 * Math.abs(Math.sin(lifeAnimTimer * 15))) : 1;
    ctx.fillText('♥', 0, 0);

  ctx.fillStyle = grd;
  ctx.fillRect(0, H-8, W*ratio, 8);
  // Glow on bar tip
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.fillRect(W*ratio - 2, H-8, 3, 8);

  // Wave indicator
  const wave = 1 + Math.floor(time/15);

}

function drawParticles() {
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    ctx.save();
    const a = p.life / p.maxLife;
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    if (p.glow) { ctx.shadowColor = p.color; ctx.shadowBlur = 6; }
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * a, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life--;
  });
}

function spawnExplosion(x, y, color, count=22) {
  for (let i = 0; i < count; i++) {
    const a = (Math.PI*2/count)*i + (Math.random()-0.5)*0.3;
    const spd = Math.random()*4+1;
    particles.push({ x, y, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd, r:Math.random()*3+1, life:35+Math.floor(Math.random()*15), maxLife:50, color, glow:true });
  }
  // Sparkle ring
  for (let i = 0; i < 8; i++) {
    const a = Math.random()*Math.PI*2;
    particles.push({ x, y, vx:Math.cos(a)*(6+Math.random()*4), vy:Math.sin(a)*(6+Math.random()*4), r:1.5, life:20, maxLife:20, color:'#ffffff', glow:true });
  }
}

// === POWERUP SYSTEM ===
function spawnPowerup() {
  const type = Math.random() < 0.32 ? 'bomb' : 'shield';
  powerups.push({ x:80+Math.random()*(W-160), y:80+Math.random()*(H-160), type, timer:9, pulse:0 });

function drawPowerups(dt) {
  powerups = powerups.filter(p => p.timer > 0);
  powerups.forEach(p => {
    p.timer -= dt;
    p.pulse += dt * 4;
    const a = Math.min(1, p.timer * 0.6);
    const isBomb = p.type === 'bomb';
    const col = isBomb ? '#ffee00' : '#00ffff';
    const bgCol = isBomb ? 'rgba(255,220,0,0.2)' : 'rgba(0,200,255,0.25)';
    ctx.save();
    ctx.globalAlpha = a;
    ctx.strokeStyle = col; ctx.lineWidth = 2;
    ctx.shadowColor = col;
    ctx.shadowBlur = 10 + 5*Math.sin(p.pulse);
    ctx.beginPath(); ctx.arc(p.x, p.y, 14+3*Math.sin(p.pulse), 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle = bgCol;
    ctx.beginPath(); ctx.arc(p.x, p.y, 12, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = col;
    ctx.font = 'bold 13px monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowBlur = 8;
    ctx.fillText(isBomb ? '폭탄' : '방패', p.x, p.y);
    ctx.restore();
  });
}

function checkPowerupCollect() {
  for (let i = powerups.length-1; i >= 0; i--) {
    const p = powerups[i];
    const dx = p.x-ship.x, dy = p.y-ship.y;
    if (dx*dx+dy*dy < 22*22) {
      powerups.splice(i, 1);
      if (p.type === 'bomb') {
        const cnt = bullets.length;
        bullets.forEach(b => spawnExplosion(b.x, b.y, b.penalty?'#ff4444':'#ffaa00', 6));
        bullets = [];
        snd.bomb();
        spawnExplosion(ship.x, ship.y, '#ffee00', 28);
        screenShake = 16;
        streakMsg = `폭탄! ${cnt}개 제거!`; streakAlpha = 2.5;
      } else {
        invincible = 3;
        snd.shield();
        spawnExplosion(ship.x, ship.y, '#00ffff', 16);
        streakMsg = '방패 획득! 3초 무적!'; streakAlpha = 2.2;
      }
    }
  }
}

// === BULLET SYSTEM ===
function spawnBullet(penalty, pattern) {
  const pat = pattern || 'straight';
  const side = Math.floor(Math.random()*4);
  let x, y;
  const tx = W/2 + (Math.random()-0.5)*220;
  const ty = H/2 + (Math.random()-0.5)*220;
  if (side===0){ x=Math.random()*W; y=-8; }
  else if(side===1){ x=W+8; y=Math.random()*H; }
  else if(side===2){ x=Math.random()*W; y=H+8; }
  else{ x=-8; y=Math.random()*H; }
  const dx=tx-x, dy=ty-y, dist=Math.sqrt(dx*dx+dy*dy)||1;
  const spd = bulletSpeed * (penalty ? 1.2 : 1);
  const b = {
    x, y,
    vx: dx/dist*spd,
    vy: dy/dist*spd,
    baseVx: dx/dist*spd,
    baseVy: dy/dist*spd,
    penalty: !!penalty,
    pattern: pat,
    trail: [],
    age: 0,  // seconds alive, for sine/spiral motion
  };
  bullets.push(b);
}

function spawnSineBullet() {
  // Fires from top, goes straight down with side-to-side wave
  const x = Math.random() * W;
  const speed = bulletSpeed;
  bullets.push({
    x, y: -8,
    vx: 0, vy: speed,
    baseVx: 0, baseVy: speed,
    penalty: false,
    pattern: 'sine',
    trail: [],
    age: 0,
    sineAmp: 60 + Math.random() * 80,
    sineFreq: 1.5 + Math.random(),
    sinePhaseOffset: Math.random() * Math.PI * 2,
  });
}

function spawnSpiralBurst() {
  // Burst of bullets in a spiral/spread pattern from center edges
  const count = 6 + difficultyLevel;
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i + spiralAngle;
    const spawnDist = 350;
    const cx = W/2, cy = H/2;
    const x = cx + Math.cos(angle) * spawnDist;
    const y = cy + Math.sin(angle) * spawnDist;
    const dx = cx - x, dy = cy - y;
    const dist = Math.sqrt(dx*dx+dy*dy) || 1;
    const spd = bulletSpeed * 0.85;
    bullets.push({
      x, y,
      vx: dx/dist*spd, vy: dy/dist*spd,
      baseVx: dx/dist*spd, baseVy: dy/dist*spd,
      penalty: false,
      pattern: 'spiral',
      trail: [],
      age: 0,
    });
  }
  spiralAngle += 0.4;
}

function spawnPenalty() {
  for (let i=0; i<50; i++) spawnBullet(true, 'straight');
}

  if (usedQuizIndices.size >= quizData.length) usedQuizIndices.clear();

function answerQuiz(ans) {
  if (quizAnswered) return;
  quizAnswered = true;
  resultCorrect = (ans === quizQuestion.a);
  if (!resultCorrect) penaltyPending = true;
  if (resultCorrect) {
    streak++;
    snd.correct();
    if (streak === 10) {
      spawnExplosion(W/2, H*0.4, '#ffff00', 35);
      streakMsg = `${streak}연속!! 번개 실력!`; streakAlpha = 3;
      screenShake = 10;
    } else if (streak === 15) {
      spawnExplosion(W/2, H/3, '#ffffff', 40);
      spawnExplosion(W/4, H/2, '#ffaa00', 25);
      spawnExplosion(3*W/4, H/2, '#ffaa00', 25);
      streakMsg = `${streak}연속!!! 무적 비행사!!`; streakAlpha = 4;
      screenShake = 20;
    } else if (streak % 5 === 0) {
      lives = Math.min(3, lives + 1);
      snd.lifeUp();
      streakMsg = `${streak}연속! 목숨 회복!`; streakAlpha = 3;
    } else if (streak >= 3) {
      streakMsg = `${streak}연속 정답!`; streakAlpha = 2.5;
    }
  } else {
    streak = 0;
    snd.wrong();
  }
  resultTimer = 1.8;
  state = 'result';
}

  const fade = Math.min(1, resultTimer / 0.5);

  ctx.save();

  ctx.fillRect(0,0,W,H);

// === EDGE WARNINGS ===
function drawEdgeWarnings() {
  const margin = 28;
  bullets.forEach(b => {
    const dx = W/2 - b.x, dy = H/2 - b.y;
    const dot = b.vx*dx + b.vy*dy;
    if (dot <= 0) return;
    let ex, ey, angle;
    if (b.x < 0)      { ex=margin;   ey=Math.max(margin,Math.min(H-margin,b.y)); angle=0; }
    else if(b.x > W)  { ex=W-margin; ey=Math.max(margin,Math.min(H-margin,b.y)); angle=Math.PI; }
    else if(b.y < 0)  { ex=Math.max(margin,Math.min(W-margin,b.x)); ey=margin;   angle=Math.PI/2; }
    else if(b.y > H)  { ex=Math.max(margin,Math.min(W-margin,b.x)); ey=H-margin; angle=-Math.PI/2; }
    else return;
    ctx.save();
    ctx.translate(ex, ey);
    ctx.rotate(angle);
    ctx.fillStyle = b.penalty ? 'rgba(255,50,50,0.85)' : 'rgba(255,220,0,0.7)';
    ctx.shadowColor = b.penalty ? '#ff0000' : '#ffcc00';
    ctx.shadowBlur = 6;
    ctx.beginPath(); ctx.moveTo(8,0); ctx.lineTo(-5,-5); ctx.lineTo(-5,5); ctx.closePath();
    ctx.fill();
    ctx.restore();
  });
}

// === COLLISION ===
function checkHit() {
  if (invincible > 0) return;
  for (let i=bullets.length-1; i>=0; i--) {
    const b=bullets[i], dx=b.x-ship.x, dy=b.y-ship.y;
    if (dx*dx+dy*dy < 10*10) {
      spawnExplosion(b.x, b.y, b.penalty?'#ff4444':'#ffaa00');
      bullets.splice(i,1);
      snd.hit();
      const prevLives = lives;
      lives--;
      hitFlash=25;
      screenShake=14;
      invincible=1.5;
      // Trigger heart loss animation
      lifeAnimLost = prevLives - 1;
      lifeAnimTimer = 1.0;
      // Red screen flash
      hitFlash = 30;
      if (lives<=0) {
        isNewRecord = time > bestTime;
        if (isNewRecord) { bestTime=time; localStorage.setItem('bulletBest',bestTime); }
        updateLeaderboard(time);
        state='dead';
        stopBGM();
        snd.gameOver();
        if (isNewRecord) { spawnConfetti(W/2, H/2); snd.newRecord(); }
        spawnExplosion(ship.x, ship.y, '#ff8800', 40);
      }
      return;
    }
  }
}

// === MAIN LOOP ===
let lastStaticDt = 0;
function loop(ts) {
  requestAnimationFrame(loop);
  const dt = Math.min((ts-lastTime)/1000, 0.05);
  lastTime = ts;
  lastStaticDt = dt;

  // Screen shake transform
  let sx=0, sy=0;
  if (screenShake>0) { sx=(Math.random()-0.5)*screenShake; sy=(Math.random()-0.5)*screenShake; screenShake*=0.75; if(screenShake<0.5)screenShake=0; }
  ctx.save();
  ctx.translate(sx, sy);

  drawBG();
  drawStars(dt);

  // Wave colour tint (increases with wave number)
  if (state==='play'||state==='quiz'||state==='result'||state==='countdown') {
    const wv = 1+Math.floor(time/15);
    if (wv >= 4) {
      ctx.save();
      ctx.globalAlpha = Math.min(0.12, (wv-3)*0.025);
      ctx.fillStyle = wv >= 7 ? '#ff1100' : '#ff6600';
      ctx.fillRect(0,0,W,H);
      ctx.restore();
    }
  }

  if (state==='start') { drawStart(dt); ctx.restore(); return; }
  if (state==='dead')  { drawDead();    drawParticles(); ctx.restore(); return; }
  if (paused) {
    drawThruster(); drawParticles(); drawShip(ship.x, ship.y); drawHUD();
    drawPauseScreen(); ctx.restore(); return;
  }

  // Ship keyboard + joystick movement
  if (state==='play'||state==='countdown') {
    let dx=0, dy=0;
    if(keys['ArrowLeft']||keys['a']||keys['A']) dx-=1;
    if(keys['ArrowRight']||keys['d']||keys['D']) dx+=1;
    if(keys['ArrowUp']||keys['w']||keys['W'])   dy-=1;
    if(keys['ArrowDown']||keys['s']||keys['S'])  dy+=1;
    if (vjoyActive) { dx += vjoyDx; dy += vjoyDy; }
    const moving = dx!==0||dy!==0;
    if(dx!==0&&dy!==0){dx*=0.707;dy*=0.707;}
    ship.vx=dx*SHIP_SPEED; ship.vy=dy*SHIP_SPEED;
    ship.x=Math.max(20,Math.min(W-20,ship.x+dx*SHIP_SPEED*dt));
    ship.y=Math.max(20,Math.min(H-20,ship.y+dy*SHIP_SPEED*dt));
    emitThruster(ship.x, ship.y, ship.vx, ship.vy, moving);
  }

  if (state==='play') {
    time+=dt;
    if (invincible>0) invincible-=dt;
    if (lifeAnimTimer>0) lifeAnimTimer-=dt;

    // Per-second difficulty update
    if (ts - lastSecondTimestamp >= 1000) {
      lastSecondTimestamp = ts;
      updateDifficultyEverySecond();
    }

    // Streak message fade
    if (streakAlpha>0) streakAlpha-=dt*1.2;
    if (diffAnnounce>0) diffAnnounce-=dt;

    // Bullet spawning with patterns based on difficulty
    const batchSize = 1+Math.floor(time/15);
    if (Math.random() < bulletSpawnRate*60*dt) {
      // Choose pattern based on difficulty
      const rand = Math.random();
      if (difficultyLevel >= 5 && rand < 0.25) {
        // Sine wave bullets
        for (let i = 0; i < Math.ceil(batchSize/2); i++) spawnSineBullet();
      } else if (difficultyLevel >= 3 && rand < 0.15) {
        // Spiral burst (once every few spawns)
        spawnSpiralBurst();
      } else {
        for (let i = 0; i < batchSize; i++) spawnBullet(false, 'straight');
      }
      if (Math.random()<0.4) snd.shoot();
    }

    if (time-lastQuizTime>=15) { vjoyReset(); state='quiz'; pickQuiz(); }
    if (time-lastPowerupTime>=30 && powerups.length===0) { spawnPowerup(); lastPowerupTime=time; }
    const curWave = 1+Math.floor(time/15);
    if (curWave > lastWave) { lastWave=curWave; waveAnnounce=1.6; }
    if (waveAnnounce>0) waveAnnounce-=dt;
    // Milestone check
    MILESTONES.forEach(m => {
      if (time >= m.time && !reachedMilestones.has(m.time)) {
        reachedMilestones.add(m.time);
        showMilestone(m.msg, m.color);
        snd.newRecord();
      }
    });
    if (milestoneAlpha>0) milestoneAlpha-=dt;
  }

  if (state==='quiz') {
    quizCountdown-=dt;
    if (quizCountdown<=0&&!quizAnswered) {
      quizAnswered=true; resultCorrect=false; penaltyPending=true;
      snd.wrong(); resultTimer=1.8; state='result';
    }
  }

  if (state==='result') {
    resultTimer-=dt;
    if (resultTimer<=0) {
      if(penaltyPending){spawnPenalty();snd.penalty();penaltyPending=false;}
      countdownTimer=3; lastQuizTime=time; state='countdown';
    }
  }

  if (state==='countdown') {
    const prev=Math.ceil(countdownTimer);
    countdownTimer-=dt;
    const cur=Math.ceil(countdownTimer);
    if(cur<prev&&cur>0) snd.countdown(cur);
    if(countdownTimer<=0){state='play';snd.countdown(1);}
  }

  // Update + draw bullets (with pattern motion)
  const moveBullets = state==='play'||state==='countdown';
  for (let i=bullets.length-1;i>=0;i--) {
    const b=bullets[i];
    if (moveBullets) {
      if(!b.trail) b.trail=[];
      b.trail.push({x:b.x,y:b.y});
      if(b.trail.length>8) b.trail.shift();

      // Pattern-specific motion updates
      if (b.pattern === 'sine') {
        b.age += dt;
        const perp = b.sineAmp * Math.sin(b.sineFreq * b.age * Math.PI * 2 + (b.sinePhaseOffset||0));
        // perpendicular to main direction (main dir is down, perp is left/right)
        b.x += (b.baseVx + perp) * dt;
        b.y += b.baseVy * dt;
      } else if (b.pattern === 'spiral') {
        b.age += dt;
        // slight orbit drift
        const drift = Math.sin(b.age * 3) * 20 * dt;
        const perp = { x: -b.baseVy, y: b.baseVx };
        const plen = Math.sqrt(perp.x*perp.x + perp.y*perp.y) || 1;
        b.x += b.vx * dt + (perp.x/plen) * drift;
        b.y += b.vy * dt + (perp.y/plen) * drift;
      } else {
        b.x+=b.vx*dt; b.y+=b.vy*dt;
      }
    }
    if(b.x<-60||b.x>W+60||b.y<-60||b.y>H+60){bullets.splice(i,1);continue;}
    drawBullet(b);
  }

  if(state==='play') { checkHit(); checkPowerupCollect(); }

  drawPowerups(state==='play' ? dt : 0);
  drawEdgeWarnings();
  drawThruster();
  drawParticles();
  drawShip(ship.x, ship.y);

  // Red hit flash overlay on screen
  if (hitFlash > 0) {
    ctx.save();
    ctx.globalAlpha = (hitFlash / 30) * 0.35;
    ctx.fillStyle = '#ff0000';
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
    hitFlash--;
  }

  // Streak message
  if (streakAlpha>0 && streakMsg) {
    ctx.save();
    ctx.globalAlpha = Math.min(1, streakAlpha);
    ctx.fillStyle = '#ffaa00';
    ctx.shadowColor = '#ff8800'; ctx.shadowBlur = 15;
    ctx.font = 'bold 28px "맑은 고딕", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(streakMsg, W/2, H/2 - 60);
    ctx.restore();
  }

  // Difficulty up announcement
  if (diffAnnounce > 0 && diffAnnounceMsg) {
    const a = Math.min(1, diffAnnounce * 0.8);
    const scale = 1 + 0.05 * Math.sin(Date.now() * 0.006);
    ctx.save();
    ctx.globalAlpha = a;
    ctx.translate(W/2, H * 0.18);
    ctx.scale(scale, scale);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const diffColor = difficultyLevel >= 8 ? '#ff4400' : (difficultyLevel >= 5 ? '#ffaa00' : '#88ff88');
    ctx.shadowColor = diffColor; ctx.shadowBlur = 25;
    ctx.fillStyle = diffColor;
    ctx.font = 'bold 26px "맑은 고딕", sans-serif';
    ctx.fillText(diffAnnounceMsg, 0, 0);
    ctx.restore();
  }

  // Milestone popup
  if (milestoneAlpha > 0 && milestoneText) {
    const a = Math.min(1, milestoneAlpha);
    const scale = 1 + 0.08 * Math.sin(Date.now() * 0.004);
    ctx.save();
    ctx.globalAlpha = a;
    ctx.translate(W/2, H * 0.25);
    ctx.scale(scale, scale);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = milestoneColor; ctx.shadowBlur = 30;
    ctx.fillStyle = milestoneColor;
    ctx.font = 'bold 32px "맑은 고딕", sans-serif';
    ctx.fillText(milestoneText, 0, 0);
    ctx.restore();
  }

  // Invincible shield ring overlay
  if (invincible>0) {
    const alpha = Math.floor(invincible*10)%2===0 ? 0.15 : 0;
    if (alpha > 0) {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = '#00ccff';
      ctx.fillRect(0,0,W,H);
      ctx.restore();
    }
  }

  // Wave announcement flash
  if (waveAnnounce > 0 && lastWave > 1) {
    const a = Math.min(1, waveAnnounce * 1.2);
    ctx.save();
    ctx.globalAlpha = a;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = '#aaddff'; ctx.shadowBlur = 30;
    ctx.fillStyle = '#aaddff';
    ctx.font = `bold ${Math.floor(36 + (1-a)*10)}px "맑은 고딕", sans-serif`;
    ctx.fillText(`WAVE ${lastWave}`, W/2, H*0.72);
    ctx.restore();
  }

  drawHUD();

  if(state==='quiz')      drawQuizOverlay();
  if(state==='result')    drawResultOverlay();
  if(state==='countdown') drawCountdownOverlay();

  ctx.restore();
}

// === INPUT ===
function startGame() {
  state='play';
  ship={x:W/2, y:H/2, vx:0, vy:0};
  bullets=[]; particles=[]; thrusterParts=[];
  time=0; lives=3; lastQuizTime=0;
  quizAnswered=false; penaltyPending=false;
  resultTimer=0; countdownTimer=0;
  hitFlash=0; screenShake=0; isNewRecord=false;
  invincible=0; paused=false; streak=0; streakAlpha=0;
  powerups=[]; lastPowerupTime=-20; lastWave=1; waveAnnounce=0;
  reachedMilestones.clear(); milestoneAlpha=0;
  // Reset difficulty
  gameTimeSec=0; bulletSpeed=70; bulletSpawnRate=0.03;
  difficultyLevel=1; diffAnnounce=0; diffAnnounceMsg='';
  spiralAngle=0; sinePhase=0;
  lifeAnimTimer=0; lifeAnimLost=-1;
  lastSecondTimestamp=0;
  usedQuizIndices.clear();
  startBGM();
}

function drawPauseScreen() {
  ctx.fillStyle='rgba(0,0,20,0.75)';
  ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#ffffff';
  ctx.font='bold 44px "맑은 고딕", monospace';
  ctx.textAlign='center';
  ctx.shadowColor='#00ccff'; ctx.shadowBlur=20;
  ctx.fillText('일시정지', W/2, H/2-30);
  ctx.shadowBlur=0;
  ctx.font='18px "맑은 고딕", sans-serif';
  ctx.fillStyle='#aaddff';
  ctx.fillText('ESC 또는 P 키를 눌러 계속', W/2, H/2+20);
  ctx.fillStyle='#778899';
  ctx.font='14px monospace';
  ctx.fillText(`생존 시간: ${time.toFixed(1)}s  |  난이도: ${difficultyLevel}단계`, W/2, H/2+55);
}

document.addEventListener('keydown', e=>{
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
  if(state==='start'||state==='dead'){startGame();return;}
  if((e.key==='Escape'||e.key==='p'||e.key==='P') && (state==='play'||paused)) {
    paused=!paused;
    return;
  }
  if(e.key==='m'||e.key==='M') {
    muted=!muted;
    masterGain.gain.value = muted ? 0 : 0.7;
    return;
  }
  if(paused) return;
  if(state==='quiz'){
    if(e.key==='1') answerQuiz(true);
    if(e.key==='2') answerQuiz(false);
  }
});

canvas.addEventListener('click', e=>{
  if(state==='start'||state==='dead'){startGame();return;}
  if(state==='quiz'){
    const rect=canvas.getBoundingClientRect();
    const mx=(e.clientX-rect.left)*W/rect.width;
    const my=(e.clientY-rect.top)*H/rect.height;
    if(mx>=W/2-120&&mx<=W/2-20&&my>=H/2-10&&my<=H/2+42) answerQuiz(true);
    if(mx>=W/2+20&&mx<=W/2+120&&my>=H/2-10&&my<=H/2+42) answerQuiz(false);
  }
});

requestAnimationFrame(loop);

// === 모바일 가상 조이스틱 ===
let vjoyDx = 0, vjoyDy = 0, vjoyActive = false;
const vjoyZone = document.getElementById('vjoy-zone');
const vjoyStick = document.getElementById('vjoy-stick');
const VJOY_HALF = 55, VSTICK_HALF = 22;

function vjoyReset() {
  vjoyActive = false; vjoyDx = 0; vjoyDy = 0;
  if (vjoyStick) {
    vjoyStick.style.left = (VJOY_HALF - VSTICK_HALF) + 'px';
    vjoyStick.style.top  = (VJOY_HALF - VSTICK_HALF) + 'px';
  }
}

function vjoyUpdateTouch(touch) {
  const rect = vjoyZone.getBoundingClientRect();
  const cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
  let dx = touch.clientX - cx, dy = touch.clientY - cy;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const maxR = VJOY_HALF - VSTICK_HALF;
  if (dist > maxR) { const s = maxR / dist; dx *= s; dy *= s; }
  vjoyDx = dx / maxR; vjoyDy = dy / maxR;
  vjoyStick.style.left = (VJOY_HALF - VSTICK_HALF + dx) + 'px';
  vjoyStick.style.top  = (VJOY_HALF - VSTICK_HALF + dy) + 'px';
}

vjoyZone.addEventListener('touchstart', e => { e.preventDefault(); vjoyActive = true; vjoyUpdateTouch(e.touches[0]); }, {passive:false});
vjoyZone.addEventListener('touchmove',  e => { e.preventDefault(); if (vjoyActive) vjoyUpdateTouch(e.touches[0]); }, {passive:false});
vjoyZone.addEventListener('touchend',   e => { e.preventDefault(); vjoyReset(); }, {passive:false});
vjoyZone.addEventListener('touchcancel',e => { e.preventDefault(); vjoyReset(); }, {passive:false});

// 캔버스 터치: 퀴즈 답변 + 시작/사망 화면
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (state === 'start' || state === 'dead') { startGame(); return; }
  if (state === 'quiz') {
    const t = e.changedTouches[0];
    const rect = canvas.getBoundingClientRect();
    const mx = (t.clientX - rect.left) * W / rect.width;
    const my = (t.clientY - rect.top) * H / rect.height;
    if (mx>=W/2-120&&mx<=W/2-20&&my>=H/2-10&&my<=H/2+42) answerQuiz(true);
    if (mx>=W/2+20&&mx<=W/2+120&&my>=H/2-10&&my<=H/2+42) answerQuiz(false);
  }
}, {passive:false});

// 터치 기기 감지 후 조이스틱 표시/숨김 (drawHUD 호출마다 갱신)
const _isTouchDev = ('ontouchstart' in window || navigator.maxTouchPoints > 0);
if (_isTouchDev) vjoyZone.style.display = 'block';

function updateVjoyVisibility() {
  if (!_isTouchDev || !vjoyZone) return;
  const show = state !== 'start' && state !== 'dead';
  if (show && vjoyZone.style.display === 'none') vjoyZone.style.display = 'block';
  else if (!show && vjoyZone.style.display !== 'none') { vjoyZone.style.display = 'none'; vjoyReset(); }
}
const __drawHUD = drawHUD;
drawHUD = function() { __drawHUD(); updateVjoyVisibility(); };
</script>
