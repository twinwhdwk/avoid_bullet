const AC = new (window.AudioContext || window.webkitAudioContext)();
const masterGain = AC.createGain();
masterGain.gain.value = 0.7;
masterGain.connect(AC.destination);
function resumeAC() { if (AC.state === 'suspended') AC.resume(); }
document.addEventListener('keydown', resumeAC);

// Reverb
let reverbNode = null;
(function buildReverb() {
  const len = AC.sampleRate * 1.5;
  const buf = AC.createBuffer(2, len, AC.sampleRate);
  for (let c = 0; c < 2; c++) {
    const d = buf.getChannelData(c);
    for (let i = 0; i < len; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/len, 2);
  }
  reverbNode = AC.createConvolver();
  reverbNode.buffer = buf;
  const rv = AC.createGain(); rv.gain.value = 0.25;
  reverbNode.connect(rv); rv.connect(masterGain);
})();

function playTone(freq, type, dur, vol=0.3, startFreq=null, reverb=false) {
  const o = AC.createOscillator();
  const g = AC.createGain();
  o.connect(g);
  g.connect(masterGain);
  if (reverb && reverbNode) g.connect(reverbNode);
  o.type = type;
  if (startFreq) { o.frequency.setValueAtTime(startFreq, AC.currentTime); o.frequency.exponentialRampToValueAtTime(freq, AC.currentTime + dur*0.4); }
  else o.frequency.setValueAtTime(freq, AC.currentTime);
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
  o.start(); o.stop(AC.currentTime + dur + 0.05);
}
function playNoise(dur, vol=0.15, filterFreq=2000) {
  const buf = AC.createBuffer(1, AC.sampleRate * dur, AC.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random()*2-1;
  const src = AC.createBufferSource();
  const flt = AC.createBiquadFilter(); flt.type = 'lowpass'; flt.frequency.value = filterFreq;
  const g = AC.createGain();
  src.buffer = buf; src.connect(flt); flt.connect(g); g.connect(masterGain);
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
  src.start();
}

// BGM
let bgmNodes = [];
function startBGM() {
  stopBGM();
  const chords = [[130.8,164.8,196],[138.6,174.6,207.7],[116.5,146.8,174.6],[123.5,155.6,185]];
  let ci = 0;
  // Bass drone
  const bass = AC.createOscillator(); const bg = AC.createGain();
  bass.type = 'sine'; bass.frequency.value = 65.4;
  bg.gain.value = 0.08; bass.connect(bg); bg.connect(masterGain);
  bass.start(); bgmNodes.push(bass, bg);
  // Pad chords
  function playChord() {
    const chord = chords[ci++ % chords.length];
    chord.forEach(f => {
      const o = AC.createOscillator(); const g = AC.createGain();
      o.type = 'sine'; o.frequency.value = f;
      g.gain.setValueAtTime(0, AC.currentTime);
      g.gain.linearRampToValueAtTime(0.04, AC.currentTime+1.5);
      g.gain.linearRampToValueAtTime(0.04, AC.currentTime+3);
      g.gain.linearRampToValueAtTime(0, AC.currentTime+4.5);
      o.connect(g); g.connect(reverbNode || masterGain);
      o.start(); o.stop(AC.currentTime+5);
      bgmNodes.push(o, g);
    });
  }
  playChord();
  const iv = setInterval(playChord, 4000);
  bgmNodes.push({ stop: ()=>clearInterval(iv) });
}
function stopBGM() {
  bgmNodes.forEach(n => { try { if(n.stop) n.stop(); } catch(e){} });
  bgmNodes = [];
}

// === DRAW HELPERS ===
function drawBG() {
  ctx.fillStyle = '#000008';
  ctx.fillRect(0, 0, W, H);
  nebulaParticles.forEach(n => {
    const grd = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
    grd.addColorStop(0, n.color); grd.addColorStop(1, 'transparent');
    ctx.fillStyle = grd; ctx.fillRect(0,0,W,H);
  });
}

function drawStars(dt) {
  const now = Date.now()/1000;
  stars.forEach(s => {
    s.y += s.spd * dt;
    if (s.y > H+2) { s.y = -2; s.x = Math.random()*W; }
    const twinkle = 0.5 + 0.5 * Math.sin(now * 3 + s.b * 10);
    ctx.fillStyle = `rgba(255,255,255,${0.3 + s.b * 0.5 * twinkle})`;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
  });
}

function drawShip(x, y) {
  ctx.save();
  ctx.translate(x, y);
  if (hitFlash > 0) ctx.globalAlpha = 0.4 + 0.6 * Math.abs(Math.sin(hitFlash * 0.8));

  // Glow
  ctx.save();
  ctx.shadowColor = '#00ccff'; ctx.shadowBlur = 18;
  ctx.fillStyle = '#88ccff';
  ctx.beginPath(); ctx.moveTo(0,-22); ctx.lineTo(14,11); ctx.lineTo(0,6); ctx.lineTo(-14,11); ctx.closePath();
  ctx.fill();
  ctx.restore();

  // Cockpit glow
  ctx.save(); ctx.shadowColor = '#00ffff'; ctx.shadowBlur = 10;
  ctx.fillStyle = '#00eeff';
  ctx.beginPath(); ctx.ellipse(0,-6,5,9,0,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // Wing engines
  [[-14,11],[ 14,11]].forEach(([ex,ey]) => {
    ctx.save(); ctx.shadowColor = '#ff6600'; ctx.shadowBlur = 8;
    ctx.fillStyle = '#ff8833';
    ctx.beginPath();
    ctx.moveTo(ex, ey); ctx.lineTo(ex + Math.sign(ex)*6, ey+4); ctx.lineTo(ex - Math.sign(ex)*2, ey+4);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  });
  ctx.restore();
}

function emitThruster(x, y, vx, vy, moving) {
  const count = moving ? 3 : 1;
  for (let i = 0; i < count; i++) {
    const angle = Math.PI/2 + (Math.random()-0.5)*0.5;
    const spd = moving ? (2+Math.random()*3) : (0.5+Math.random());
    thrusterParts.push({
      x: x + (Math.random()-0.5)*8,
      y: y + 14,
      vx: Math.cos(angle)*spd + vx*0.1,
      vy: Math.sin(angle)*spd + vy*0.1,
      life: 12 + Math.floor(Math.random()*10),
      maxLife: 22,
      r: moving ? (1.5+Math.random()*2) : 0.8,
      hue: 30 + Math.random()*30,
    });
  }
}

function drawThruster() {
  thrusterParts = thrusterParts.filter(p => p.life > 0);
  thrusterParts.forEach(p => {
    const a = p.life / p.maxLife;
    ctx.save();
    ctx.globalAlpha = a * 0.9;
    ctx.fillStyle = `hsl(${p.hue},100%,${40+a*40}%)`;
    ctx.shadowColor = `hsl(${p.hue},100%,60%)`;
    ctx.shadowBlur = 4;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * a, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life--;
  });
}

function drawBullet(b) {
  // Trail
  if (b.trail && b.trail.length > 1) {
    for (let i = 1; i < b.trail.length; i++) {
      const a = i / b.trail.length * 0.5;
      ctx.strokeStyle = b.penalty ? `rgba(255,50,50,${a})` : `rgba(255,220,0,${a})`;
      ctx.lineWidth = b.penalty ? 3 : 2;
      ctx.beginPath();
      ctx.moveTo(b.trail[i-1].x, b.trail[i-1].y);
      ctx.lineTo(b.trail[i].x, b.trail[i].y);
      ctx.stroke();
    }
  }
  // Bullet core
  ctx.save();
  ctx.fillStyle = b.penalty ? '#ff2222' : '#ffe040';
  ctx.shadowColor = b.penalty ? '#ff0000' : '#ffcc00';
  ctx.shadowBlur = b.penalty ? 12 : 8;
  ctx.beginPath();
  ctx.arc(b.x, b.y, b.penalty ? 5.5 : 4, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawHUD() {
  const now = Date.now()/1000;
  // Semi-transparent top bar
  ctx.fillStyle = 'rgba(0,0,20,0.5)';
  ctx.fillRect(0, 0, W, 50);

  // Timer
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 26px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(`⏱ ${time.toFixed(1)}s`, W/2, 34);

  // Lives (pulsing hearts)
  ctx.font = '22px monospace';
  ctx.textAlign = 'left';
  for (let i = 0; i < 3; i++) {
    const alive = i < lives;
    const pulse = alive ? (1 + 0.1 * Math.sin(now*4 + i)) : 1;
    ctx.save();
    ctx.translate(14 + i*28, 26);
    ctx.scale(pulse, pulse);
    ctx.fillStyle = alive ? '#ff4466' : '#333';
    ctx.shadowColor = alive ? '#ff0044' : 'transparent';
    ctx.shadowBlur = alive ? 8 : 0;
    ctx.fillText('♥', 0, 0);
    ctx.restore();
  }

  // Best
  ctx.textAlign = 'right';
  ctx.fillStyle = '#ffcc00';
  ctx.font = '14px monospace';
  ctx.fillText(`최고: ${bestTime.toFixed(1)}s`, W-10, 32);

  // Quiz countdown bar (bottom)
  const ratio = Math.max(0, (15 - (time - lastQuizTime)) / 15);
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(0, H-8, W, 8);
  const barColor = ratio > 0.5 ? `hsl(${ratio*120},100%,50%)` : `hsl(${ratio*120},100%,50%)`;
  const grd = ctx.createLinearGradient(0, 0, W*ratio, 0);
  grd.addColorStop(0, '#00ff88'); grd.addColorStop(1, ratio < 0.3 ? '#ff2200' : '#ffee00');
  ctx.fillStyle = grd;
  ctx.fillRect(0, H-8, W*ratio, 8);
  // Glow on bar tip
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.fillRect(W*ratio - 2, H-8, 3, 8);

  // Quiz incoming warning
  if (ratio < 0.2) {
    ctx.save();
    ctx.globalAlpha = 0.4 + 0.4*Math.sin(now*8);
    ctx.fillStyle = '#ff4444';
    ctx.font = 'bold 14px "맑은 고딕", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('⚠ 문제 출제 임박!', W/2, H-14);
    ctx.restore();
  }
}

function drawParticles() {
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    ctx.save();
    const a = p.life / p.maxLife;
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    if (p.glow) { ctx.shadowColor = p.color; ctx.shadowBlur = 6; }
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * a, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life--;
  });
}

function spawnExplosion(x, y, color, count=22) {
  for (let i = 0; i < count; i++) {
    const a = (Math.PI*2/count)*i + (Math.random()-0.5)*0.3;
    const spd = Math.random()*4+1;
    particles.push({ x, y, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd, r:Math.random()*3+1, life:35+Math.floor(Math.random()*15), maxLife:50, color, glow:true });
  }
  // Sparkle ring
  for (let i = 0; i < 8; i++) {
    const a = Math.random()*Math.PI*2;
    particles.push({ x, y, vx:Math.cos(a)*(6+Math.random()*4), vy:Math.sin(a)*(6+Math.random()*4), r:1.5, life:20, maxLife:20, color:'#ffffff', glow:true });
  }
}

function spawnConfetti(cx, cy) {
  const colors = ['#ff0','#f80','#0f8','#08f','#f0f','#fff'];
  for (let i = 0; i < 60; i++) {
    const a = Math.random()*Math.PI*2, spd = Math.random()*6+2;
    particles.push({ x:cx+(Math.random()-0.5)*40, y:cy+(Math.random()-0.5)*40, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd-3, r:3+Math.random()*3, life:60+Math.floor(Math.random()*30), maxLife:90, color:colors[Math.floor(Math.random()*colors.length)], glow:false });
  }
}

// === BULLET SYSTEM ===
function spawnBullet(penalty) {
  const side = Math.floor(Math.random()*4);
  let x, y;
  const tx = W/2 + (Math.random()-0.5)*220;
  const ty = H/2 + (Math.random()-0.5)*220;
  if (side===0){ x=Math.random()*W; y=-8; }
  else if(side===1){ x=W+8; y=Math.random()*H; }
  else if(side===2){ x=Math.random()*W; y=H+8; }
  else{ x=-8; y=Math.random()*H; }
  const dx=tx-x, dy=ty-y, dist=Math.sqrt(dx*dx+dy*dy)||1;
  const spd = (baseSpeed + time*2) * (penalty ? 1.1 : 1);
  bullets.push({ x, y, vx:dx/dist*spd, vy:dy/dist*spd, penalty:!!penalty, trail:[] });
}

function spawnPenalty() {
  for (let i=0; i<50; i++) spawnBullet(true);
}

// === QUIZ ===
function pickQuiz() {
  quizQuestion = quizData[Math.floor(Math.random()*quizData.length)];
  quizCountdown = 10;
  quizAnswered = false;
}

function drawQuizOverlay() {
  // Dim background
  ctx.fillStyle = 'rgba(0,0,30,0.88)';
  ctx.fillRect(0,0,W,H);

  // Panel
  ctx.save();
  ctx.fillStyle = 'rgba(10,10,50,0.95)';
  ctx.strokeStyle = '#3366ff';
  ctx.lineWidth = 2;
  ctx.shadowColor = '#3366ff'; ctx.shadowBlur = 20;
  ctx.beginPath(); ctx.roundRect(W/2-220, H/2-140, 440, 280, 18); ctx.fill(); ctx.stroke();
  ctx.restore();

  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffee00';
  ctx.font = 'bold 20px "맑은 고딕", sans-serif';
  ctx.shadowColor = '#ffee00'; ctx.shadowBlur = 10;
  ctx.fillText('📚 상식 문제', W/2, H/2-110);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#ffffff';
  ctx.font = '17px "맑은 고딕", sans-serif';
  const chars = quizQuestion.q.split('');
  let line='', lines=[];
  chars.forEach(ch => { line+=ch; if(line.length>=22){lines.push(line);line='';} });
  if(line) lines.push(line);
  lines.forEach((l,i) => ctx.fillText(l, W/2, H/2-68+i*26));

  // O button
  const ox = W/2-120, ow=100, oh=52, oy=H/2-10;
  ctx.save(); ctx.shadowColor='#00ff88'; ctx.shadowBlur=15;
  ctx.fillStyle='#007744';
  ctx.beginPath(); ctx.roundRect(ox,oy,ow,oh,12); ctx.fill();
  ctx.strokeStyle='#00ff88'; ctx.lineWidth=2; ctx.stroke();
  ctx.fillStyle='#fff'; ctx.font='bold 30px monospace'; ctx.fillText('O', ox+ow/2, oy+oh/2+11);
  ctx.restore();

  // X button
  const xx = W/2+20, xw=100, xh=52, xy=H/2-10;
  ctx.save(); ctx.shadowColor='#ff4444'; ctx.shadowBlur=15;
  ctx.fillStyle='#770022';
  ctx.beginPath(); ctx.roundRect(xx,xy,xw,xh,12); ctx.fill();
  ctx.strokeStyle='#ff4444'; ctx.lineWidth=2; ctx.stroke();
  ctx.fillStyle='#fff'; ctx.font='bold 30px monospace'; ctx.fillText('X', xx+xw/2, xy+xh/2+11);
  ctx.restore();

  ctx.fillStyle='#888'; ctx.font='13px monospace'; ctx.shadowBlur=0;
  ctx.fillText('[1] = O      [2] = X', W/2, H/2+65);

  // Timer bar
  const ratio = quizCountdown/10;
  ctx.fillStyle='rgba(255,255,255,0.1)';
  ctx.beginPath(); ctx.roundRect(W/2-150, H/2+78, 300,10,5); ctx.fill();
  const bGrd = ctx.createLinearGradient(W/2-150,0,W/2+150,0);
  bGrd.addColorStop(0, ratio>0.4?'#00ffaa':'#ff4444');
  bGrd.addColorStop(1, ratio>0.4?'#00ffaa':'#ff0000');
  ctx.fillStyle=bGrd;
  ctx.beginPath(); ctx.roundRect(W/2-150, H/2+78, 300*ratio,10,5); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='13px monospace';
  ctx.fillText(`${quizCountdown.toFixed(1)}초`, W/2, H/2+108);
}

function answerQuiz(ans) {
  if (quizAnswered) return;
  quizAnswered = true;
  resultCorrect = (ans === quizQuestion.a);
  if (!resultCorrect) penaltyPending = true;
  resultCorrect ? snd.correct() : snd.wrong();
  resultTimer = 1.8;
  state = 'result';
}

function drawResultOverlay() {
  const fade = Math.min(1, resultTimer / 0.5);
  // Screen flash
  ctx.save();
  ctx.globalAlpha = fade * 0.5;
  ctx.fillStyle = resultCorrect ? '#003322' : '#330000';
  ctx.fillRect(0,0,W,H);
  ctx.restore();

  // Big text with scale pop
  const pop = 1 + Math.max(0, (resultTimer-1.3)) * 1.2;
  ctx.save();
  ctx.globalAlpha = Math.min(1, fade*2);
  ctx.translate(W/2, H/2);
  ctx.scale(pop, pop);
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.shadowColor = resultCorrect ? '#00ff88' : '#ff3333';
  ctx.shadowBlur = 30;
  ctx.fillStyle = resultCorrect ? '#00ff88' : '#ff3333';
  ctx.font = 'bold 96px "맑은 고딕", sans-serif';
  ctx.fillText(resultCorrect ? '정답!' : '오답!', 0, 0);
  if (!resultCorrect) {
    ctx.font = 'bold 20px "맑은 고딕", sans-serif';
    ctx.fillStyle = '#ffaaaa'; ctx.shadowBlur=8;
    ctx.fillText('총알 50개 발사!', 0, 68);
  }
  ctx.restore();
}

function drawCountdownOverlay() {
  const num = Math.ceil(countdownTimer);
  if (num<=0) return;
  const age = 1-(countdownTimer%1);
  const scale = 1.6-age*0.6;
  const a = Math.min(1, (1-age)*2.5);

  ctx.save();
  ctx.globalAlpha=0.4;
  ctx.fillStyle='#000010';
  ctx.fillRect(0,0,W,H);
  ctx.restore();

  ctx.save();
  ctx.translate(W/2, H/2);
  ctx.scale(scale, scale);
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.shadowColor='#ffee00'; ctx.shadowBlur=40;
  ctx.fillStyle=`rgba(255,238,0,${a})`;
  ctx.font='bold 150px monospace';
  ctx.fillText(num, 0, 0);
  ctx.restore();

  ctx.fillStyle='rgba(170,210,255,0.8)';
  ctx.font='bold 18px "맑은 고딕", sans-serif';
  ctx.textAlign='center';
  ctx.fillText('준비하세요!', W/2, H/2+100);
}

// === SCREENS ===
function drawStart(dt) {
  titleAnim += dt;
  const now = titleAnim;

  // Animated title glow
  const glow = 8 + 6*Math.sin(now*2);
  ctx.save();
  ctx.shadowColor='#00eeff'; ctx.shadowBlur=glow*2;
  ctx.fillStyle='#00eeff';
  ctx.font='bold 48px "맑은 고딕", monospace';
  ctx.textAlign='center';
  ctx.fillText('🚀 총알 피하기', W/2, 160);
  ctx.restore();

  // Subtitle
  ctx.fillStyle='rgba(150,200,255,0.85)';
  ctx.font='15px "맑은 고딕", sans-serif';
  ctx.textAlign='center';
  const lines=[
    '방향키 (↑↓←→) 또는 WASD로 비행기를 조종하세요!',
    '15초마다 상식 O/X 문제가 출제됩니다.',
    '틀리면 총알 50개가 한꺼번에 날아옵니다!',
    '목숨 ♥♥♥  —  총알에 맞으면 목숨을 잃습니다.',
    '',
  ];
  lines.forEach((l,i) => ctx.fillText(l, W/2, 222+i*30));

  // Best time
  ctx.fillStyle='#ffcc00';
  ctx.font='bold 18px monospace';
  ctx.fillText(`🏆 최고 기록: ${bestTime.toFixed(1)}초`, W/2, 378);

  // Pulsing start button
  const pulse = 1+0.05*Math.sin(now*4);
  ctx.save();
  ctx.translate(W/2, 430); ctx.scale(pulse, pulse);
  ctx.shadowColor='#ffee00'; ctx.shadowBlur=20;
  ctx.fillStyle='rgba(80,60,0,0.8)';
  ctx.beginPath(); ctx.roundRect(-150,-22,300,46,12); ctx.fill();
  ctx.strokeStyle='#ffee00'; ctx.lineWidth=2; ctx.stroke();
  ctx.fillStyle='#ffee00'; ctx.shadowBlur=0;
  ctx.font='bold 20px "맑은 고딕", sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('▶  클릭 또는 아무 키나 눌러 시작', 0, 0);
  ctx.restore();
}

function drawDead() {
  const now = Date.now()/1000;
  ctx.fillStyle='rgba(0,0,0,0.8)';
  ctx.fillRect(0,0,W,H);

  ctx.save();
  ctx.shadowColor='#ff4444'; ctx.shadowBlur=30;
  ctx.fillStyle='#ff4444';
  ctx.font='bold 48px "맑은 고딕", monospace';
  ctx.textAlign='center';
  ctx.fillText('💥 GAME OVER', W/2, H/2-90);
  ctx.restore();

  ctx.font='bold 26px monospace';
  ctx.fillStyle='#ffffff';
  ctx.textAlign='center';
  ctx.fillText(`생존 시간: ${time.toFixed(1)}초`, W/2, H/2-30);

  if (isNewRecord) {
    const glow = 8+6*Math.sin(now*4);
    ctx.save();
    ctx.shadowColor='#ffcc00'; ctx.shadowBlur=glow*3;
    ctx.fillStyle='#ffcc00';
    ctx.font='bold 28px "맑은 고딕", monospace';
    ctx.fillText('🎉 NEW RECORD! 🎉', W/2, H/2+18);
    ctx.restore();
  } else {
    ctx.fillStyle='#ffcc00'; ctx.font='20px monospace';
    ctx.fillText(`최고 기록: ${bestTime.toFixed(1)}초`, W/2, H/2+18);
  }

  const pulse = 1+0.04*Math.sin(now*4);
  ctx.save();
  ctx.translate(W/2, H/2+80); ctx.scale(pulse,pulse);
  ctx.fillStyle='rgba(0,80,0,0.7)';
  ctx.beginPath(); ctx.roundRect(-130,-18,260,38,10); ctx.fill();
  ctx.strokeStyle='#88ff88'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.fillStyle='#88ff88'; ctx.font='16px "맑은 고딕", sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('클릭 또는 아무 키나 눌러 재시작', 0, 0);
  ctx.restore();
}

// === COLLISION ===
function checkHit() {
  for (let i=bullets.length-1; i>=0; i--) {
    const b=bullets[i], dx=b.x-ship.x, dy=b.y-ship.y;
    if (dx*dx+dy*dy < 10*10) {
      spawnExplosion(b.x, b.y, b.penalty?'#ff4444':'#ffaa00');
      bullets.splice(i,1);
      snd.hit();
      lives--;
      hitFlash=25;
      screenShake=12;
      if (lives<=0) {
        isNewRecord = time > bestTime;
        if (isNewRecord) { bestTime=time; localStorage.setItem('bulletBest',bestTime); }
        state='dead';
        stopBGM();
        snd.gameOver();
        if (isNewRecord) { spawnConfetti(W/2, H/2); snd.newRecord(); }
        spawnExplosion(ship.x, ship.y, '#ff8800', 40);
      }
      return;
    }
  }
}

// === MAIN LOOP ===
let lastStaticDt = 0;
function loop(ts) {
  requestAnimationFrame(loop);
  const dt = Math.min((ts-lastTime)/1000, 0.05);
  lastTime = ts;
  lastStaticDt = dt;

  // Screen shake transform
  let sx=0, sy=0;
  if (screenShake>0) { sx=(Math.random()-0.5)*screenShake; sy=(Math.random()-0.5)*screenShake; screenShake*=0.75; if(screenShake<0.5)screenShake=0; }
  ctx.save();
  ctx.translate(sx, sy);

  drawBG();
  drawStars(state==='start'||state==='dead' ? dt : dt);

  if (state==='start') { drawStart(dt); ctx.restore(); return; }
  if (state==='dead')  { drawDead();    drawParticles(); ctx.restore(); return; }

  // Ship keyboard movement
  if (state==='play'||state==='countdown') {
    let dx=0, dy=0;
    if(keys['ArrowLeft']||keys['a']||keys['A']) dx-=1;
    if(keys['ArrowRight']||keys['d']||keys['D']) dx+=1;
    if(keys['ArrowUp']||keys['w']||keys['W'])   dy-=1;
    if(keys['ArrowDown']||keys['s']||keys['S'])  dy+=1;
    const moving = dx!==0||dy!==0;
    if(dx!==0&&dy!==0){dx*=0.707;dy*=0.707;}
    ship.vx=dx*SHIP_SPEED; ship.vy=dy*SHIP_SPEED;
    ship.x=Math.max(20,Math.min(W-20,ship.x+dx*SHIP_SPEED*dt));
    ship.y=Math.max(20,Math.min(H-20,ship.y+dy*SHIP_SPEED*dt));
    emitThruster(ship.x, ship.y, ship.vx, ship.vy, moving);
  }

  if (state==='play') {
    time+=dt;
    const batchSize = 1+Math.floor(time/15)*2;
    if (Math.random()<spawnRate*60*dt) {
      for(let i=0;i<batchSize;i++) spawnBullet(false);
      if(Math.random()<0.4) snd.shoot();
    }
    if (time-lastQuizTime>=15) { state='quiz'; pickQuiz(); }
  }

  if (state==='quiz') {
    quizCountdown-=dt;
    if (quizCountdown<=0&&!quizAnswered) {
      quizAnswered=true; resultCorrect=false; penaltyPending=true;
      snd.wrong(); resultTimer=1.8; state='result';
    }
  }

  if (state==='result') {
    resultTimer-=dt;
    if (resultTimer<=0) {
      if(penaltyPending){spawnPenalty();snd.penalty();penaltyPending=false;}
      countdownTimer=3; lastQuizTime=time; state='countdown';
    }
  }

  if (state==='countdown') {
    const prev=Math.ceil(countdownTimer);
    countdownTimer-=dt;
    const cur=Math.ceil(countdownTimer);
    if(cur<prev&&cur>0) snd.countdown(cur);
    if(countdownTimer<=0){state='play';snd.countdown(1);}
  }

  // Update + draw bullets
  const moveBullets = state==='play'||state==='countdown';
  for (let i=bullets.length-1;i>=0;i--) {
    const b=bullets[i];
    if (moveBullets) {
      if(!b.trail) b.trail=[];
      b.trail.push({x:b.x,y:b.y});
      if(b.trail.length>8) b.trail.shift();
      b.x+=b.vx*dt; b.y+=b.vy*dt;
    }
    if(b.x<-30||b.x>W+30||b.y<-30||b.y>H+30){bullets.splice(i,1);continue;}
    drawBullet(b);
  }

  if(state==='play') checkHit();

  drawThruster();
  drawParticles();
  drawShip(ship.x, ship.y);
  if(hitFlash>0) hitFlash--;
  drawHUD();

  if(state==='quiz')      drawQuizOverlay();
  if(state==='result')    drawResultOverlay();
  if(state==='countdown') drawCountdownOverlay();

  ctx.restore();
}

// === INPUT ===
function startGame() {
  state='play';
  ship={x:W/2, y:H/2, vx:0, vy:0};
  bullets=[]; particles=[]; thrusterParts=[];
  time=0; lives=3; lastQuizTime=0;
  quizAnswered=false; penaltyPending=false;
  resultTimer=0; countdownTimer=0;
  hitFlash=0; screenShake=0; isNewRecord=false;
  startBGM();
}

document.addEventListener('keydown', e=>{
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
  if(state==='start'||state==='dead'){startGame();return;}
  if(state==='quiz'){
    if(e.key==='1') answerQuiz(true);
    if(e.key==='2') answerQuiz(false);
  }
});

canvas.addEventListener('click', e=>{
  if(state==='start'||state==='dead'){startGame();return;}
  if(state==='quiz'){
    const rect=canvas.getBoundingClientRect();
    const mx=(e.clientX-rect.left)*W/rect.width;
    const my=(e.clientY-rect.top)*H/rect.height;
    if(mx>=W/2-120&&mx<=W/2-20&&my>=H/2-10&&my<=H/2+42) answerQuiz(true);
    if(mx>=W/2+20&&mx<=W/2+120&&my>=H/2-10&&my<=H/2+42) answerQuiz(false);
  }
});

requestAnimationFrame(loop);
</script>
