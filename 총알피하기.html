// === DRAW HELPERS ===
function drawStars() {
  stars.forEach(s => {
    ctx.fillStyle = `rgba(255,255,255,${0.4 + s.b * 0.6})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fill();
  });
}

function drawShip(x, y, hit) {
  ctx.save();
  ctx.translate(x, y);
  if (hit) ctx.globalAlpha = 0.5 + Math.sin(Date.now()/50)*0.5;
  // Body
  ctx.fillStyle = '#88ccff';
  ctx.beginPath();
  ctx.moveTo(0, -20);
  ctx.lineTo(13, 10);
  ctx.lineTo(0, 5);
  ctx.lineTo(-13, 10);
  ctx.closePath();
  ctx.fill();
  // Cockpit
  ctx.fillStyle = '#00eeff';
  ctx.beginPath();
  ctx.ellipse(0, -5, 5, 8, 0, 0, Math.PI*2);
  ctx.fill();
  // Wings glow
  ctx.fillStyle = '#ff6633';
  ctx.beginPath();
  ctx.moveTo(-13, 10);
  ctx.lineTo(-18, 14);
  ctx.lineTo(-8, 14);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(13, 10);
  ctx.lineTo(18, 14);
  ctx.lineTo(8, 14);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawBullet(b) {
  ctx.save();
  ctx.fillStyle = b.penalty ? '#ff2222' : '#ffee00';
  ctx.shadowColor = b.penalty ? '#ff0000' : '#ffaa00';
  ctx.shadowBlur = 6;
  ctx.beginPath();
  ctx.arc(b.x, b.y, b.penalty ? 5 : 4, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawHUD() {
  // Time
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 28px monospace';
  ctx.textAlign = 'center';
  const t = time.toFixed(1);
  ctx.fillText(`⏱ ${t}s`, W/2, 36);
  // Lives
  ctx.font = '22px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('♥'.repeat(lives) + '♡'.repeat(Math.max(0,3-lives)), 14, 34);
  // Best
  ctx.textAlign = 'right';
  ctx.fillStyle = '#ffcc00';
  ctx.fillText(`최고: ${bestTime.toFixed(1)}s`, W-14, 34);
  // Quiz timer bar
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(0, H-6, W, 6);
  const ratio = Math.max(0, (15 - (time - lastQuizTime)) / 15);
  ctx.fillStyle = ratio > 0.4 ? '#00ff88' : '#ff4444';
  ctx.fillRect(0, H-6, W * ratio, 6);
}

function drawParticles() {
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
  });
}

function spawnExplosion(x, y, color) {
  for (let i = 0; i < 18; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = Math.random() * 3 + 1;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, r: Math.random()*3+1, life: 30, maxLife: 30, color });
  }
}

// === BULLET SYSTEM ===
function spawnBullet(penalty) {
  const side = Math.floor(Math.random() * 4);
  let x, y, vx, vy;
  // Target near center with random spread
  const tx = W/2 + (Math.random()-0.5)*200;
  const ty = H/2 + (Math.random()-0.5)*200;
  if (side === 0) { x = Math.random()*W; y = -8; }
  else if (side === 1) { x = W+8; y = Math.random()*H; }
  else if (side === 2) { x = Math.random()*W; y = H+8; }
  else { x = -8; y = Math.random()*H; }
  const dx = tx - x, dy = ty - y;
  const dist = Math.sqrt(dx*dx + dy*dy) || 1;
  const spd = (baseSpeed + time*3) * (penalty ? 1.5 : 1);
  vx = dx/dist * spd;
  vy = dy/dist * spd;
  bullets.push({ x, y, vx, vy, penalty: !!penalty });
}

function spawnPenalty() {
  for (let i = 0; i < 50; i++) spawnBullet(true);
}

function drawQuizOverlay() {
  ctx.fillStyle = 'rgba(0,0,20,0.82)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffee00';
  ctx.font = 'bold 20px "맑은 고딕", sans-serif';
  ctx.fillText('📚 상식 문제', W/2, H/2 - 90);

  ctx.fillStyle = '#fff';
  ctx.font = '18px "맑은 고딕", sans-serif';
  // Word wrap
  const words = quizQuestion.q.split('');
  let line = '', lines = [];
  words.forEach(ch => {
    line += ch;
    if (line.length >= 24) { lines.push(line); line = ''; }
  });
  if (line) lines.push(line);
  lines.forEach((l, i) => ctx.fillText(l, W/2, H/2 - 50 + i*28));

  // Buttons
  ctx.fillStyle = '#00cc66';
  ctx.beginPath();
  ctx.roundRect(W/2 - 130, H/2 + 20, 110, 54, 12);
  ctx.fill();
  ctx.fillStyle = '#cc2222';
  ctx.beginPath();
  ctx.roundRect(W/2 + 20, H/2 + 20, 110, 54, 12);
  ctx.fill();

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('O', W/2 - 75, H/2 + 56);
  ctx.fillText('X', W/2 + 75, H/2 + 56);
  ctx.font = '13px monospace';
  ctx.fillStyle = '#aaa';
  ctx.fillText('[1] = O      [2] = X', W/2, H/2 + 92);

  // Countdown bar
  const ratio = quizCountdown / 10;
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(W/2 - 150, H/2 + 108, 300, 10);
  ctx.fillStyle = ratio > 0.4 ? '#00ffaa' : '#ff4444';
  ctx.fillRect(W/2 - 150, H/2 + 108, 300 * ratio, 10);
  ctx.fillStyle = '#fff';
  ctx.font = '13px monospace';
  ctx.fillText(`${quizCountdown.toFixed(1)}초`, W/2, H/2 + 133);
}

function answerQuiz(ans) {
  if (quizAnswered) return;
  quizAnswered = true;
  if (ans === quizQuestion.a) {
    // Correct
    showMsg('정답! ✨', '#00ff88');
  } else {
    // Wrong — 50 penalty bullets
    showMsg('틀렸다! 💥 총알 50개!', '#ff4444');
    penaltyPending = true;
  }
  setTimeout(() => {
    state = 'play';
    lastQuizTime = time;
    if (penaltyPending) { spawnPenalty(); penaltyPending = false; }
  }, 900);
}

let msgText = '', msgColor = '#fff', msgAlpha = 0;
function showMsg(t, c) { msgText = t; msgColor = c; msgAlpha = 1.5; }

function drawMsg() {
  if (msgAlpha <= 0) return;
  ctx.save();
  ctx.globalAlpha = Math.min(1, msgAlpha);
  ctx.fillStyle = msgColor;
  ctx.font = 'bold 30px "맑은 고딕", monospace';
  ctx.textAlign = 'center';
  ctx.fillText(msgText, W/2, H/2 - 120);
  ctx.restore();
  msgAlpha -= 0.03;
}

// === SCREENS ===
function drawStart() {
  ctx.fillStyle = '#000010';
  ctx.fillRect(0, 0, W, H);
  drawStars();

  ctx.textAlign = 'center';
  ctx.fillStyle = '#00eeff';
  ctx.font = 'bold 42px "맑은 고딕", monospace';
  ctx.fillText('🚀 총알 피하기', W/2, 160);

  ctx.fillStyle = '#aaddff';
  ctx.font = '17px "맑은 고딕", sans-serif';
  const lines = [
    '방향키 (↑↓←→) 또는 WASD로 비행기를 조종하세요!',
    '15초마다 상식문제가 출제됩니다.',
    '틀리면 총알 50개가 날아옵니다!',
    '목숨 ♥♥♥ — 총알에 맞으면 목숨을 잃습니다.',
    '',
    `최고 기록: ${bestTime.toFixed(1)}초`,
  ];
  lines.forEach((l, i) => ctx.fillText(l, W/2, 230 + i*30));

  ctx.fillStyle = '#ffee00';
  ctx.font = 'bold 22px "맑은 고딕", sans-serif';
  ctx.fillText('클릭 또는 아무 키나 눌러 시작', W/2, 440);
}

function drawDead() {
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ff4444';
  ctx.font = 'bold 44px "맑은 고딕", monospace';
  ctx.fillText('💥 GAME OVER', W/2, H/2 - 80);
  ctx.fillStyle = '#fff';
  ctx.font = '24px monospace';
  ctx.fillText(`생존 시간: ${time.toFixed(1)}초`, W/2, H/2 - 20);
  ctx.fillStyle = '#ffcc00';
  ctx.fillText(`최고 기록: ${bestTime.toFixed(1)}초`, W/2, H/2 + 20);
  ctx.fillStyle = '#88ff88';
  ctx.font = '18px "맑은 고딕", sans-serif';
  ctx.fillText('클릭 또는 아무 키나 눌러 재시작', W/2, H/2 + 80);
}

// === COLLISION ===
function checkHit() {
  const r = 10;
  for (let i = bullets.length-1; i >= 0; i--) {
    const b = bullets[i];
    const dx = b.x - ship.x, dy = b.y - ship.y;
    if (dx*dx + dy*dy < r*r) {
      spawnExplosion(b.x, b.y, b.penalty ? '#ff4444' : '#ffaa00');
      bullets.splice(i, 1);
      lives--;
      if (lives <= 0) {
        if (time > bestTime) { bestTime = time; localStorage.setItem('bulletBest', bestTime); }
        state = 'dead';
        spawnExplosion(ship.x, ship.y, '#ff8800');
      }
      return;
    }
  }
}

// === MAIN LOOP ===
let hitFlash = 0;
function loop(ts) {
  requestAnimationFrame(loop);
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  ctx.fillStyle = '#000010';
  ctx.fillRect(0, 0, W, H);
  drawStars();

  if (state === 'start') { drawStart(); return; }
  if (state === 'dead') { drawDead(); drawParticles(); return; }

  // Ship movement (keyboard)
  if (state === 'play') {
    let dx = 0, dy = 0;
    if (keys['ArrowLeft']  || keys['a'] || keys['A']) dx -= 1;
    if (keys['ArrowRight'] || keys['d'] || keys['D']) dx += 1;
    if (keys['ArrowUp']    || keys['w'] || keys['W']) dy -= 1;
    if (keys['ArrowDown']  || keys['s'] || keys['S']) dy += 1;
    if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }
    ship.x = Math.max(20, Math.min(W-20, ship.x + dx * SHIP_SPEED * dt));
    ship.y = Math.max(20, Math.min(H-20, ship.y + dy * SHIP_SPEED * dt));
  }

  if (state === 'play') {
    time += dt;
    // Spawn bullets
    const rate = spawnRate + time * 0.0008;
    if (Math.random() < rate * 60 * dt) spawnBullet(false);

    // Quiz trigger
    if (time - lastQuizTime >= 15) {
      state = 'quiz';
      pickQuiz();
    }
  }

  if (state === 'quiz') {
    quizCountdown -= dt;
    if (quizCountdown <= 0 && !quizAnswered) {
      quizAnswered = true;
      showMsg('시간 초과! 💥 총알 50개!', '#ff4444');
      penaltyPending = true;
      setTimeout(() => {
        state = 'play';
        lastQuizTime = time;
        if (penaltyPending) { spawnPenalty(); penaltyPending = false; }
      }, 900);
    }
  }

  // Update + draw bullets
  for (let i = bullets.length-1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    if (b.x < -20 || b.x > W+20 || b.y < -20 || b.y > H+20) {
      bullets.splice(i, 1);
      continue;
    }
    drawBullet(b);
  }

  if (state === 'play') checkHit();

  drawParticles();
  drawShip(ship.x, ship.y, hitFlash > 0);
  if (hitFlash > 0) hitFlash--;
  drawHUD();
  drawMsg();

  if (state === 'quiz') drawQuizOverlay();
}

// === INPUT ===
function startGame() {
  state = 'play';
  ship = { x: W/2, y: H/2 };
  bullets = [];
  particles = [];
  time = 0;
  lives = 3;
  lastQuizTime = 0;
  quizAnswered = false;
  penaltyPending = false;
  msgAlpha = 0;
}

document.addEventListener('keydown', e => {
  if (state === 'start' || state === 'dead') { startGame(); return; }
  if (state === 'quiz') {
    if (e.key === '1') answerQuiz(true);
    if (e.key === '2') answerQuiz(false);
  }
  // Prevent page scroll on arrow keys
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
});

canvas.addEventListener('click', e => {
  if (state === 'start' || state === 'dead') { startGame(); return; }
  if (state === 'quiz') {
    const rect = canvas.getBoundingClientRect();
    const scaleX = W / rect.width, scaleY = H / rect.height;
    const mx = (e.clientX - rect.left) * scaleX;
    const my = (e.clientY - rect.top) * scaleY;
    // O button
    if (mx >= W/2-130 && mx <= W/2-20 && my >= H/2+20 && my <= H/2+74) answerQuiz(true);
    // X button
    if (mx >= W/2+20 && mx <= W/2+130 && my >= H/2+20 && my <= H/2+74) answerQuiz(false);
  }
});


requestAnimationFrame(loop);
</script>
</body>
